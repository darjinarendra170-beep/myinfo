<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="upperbox">
            <div class="upper-inside">
                <h1 class="main-heading">WELCOME TO MY PAGE</h1>
                <p class="main-para">This is a Normal Form Filling Web</p>

            </div>
            
        </div>



    </header>
    
    <input type="checkbox" id="toggle" >
    <label for="toggle" class="label">
         START
    </label>

    
    <div class="main-content">

        <div class="name outer">
            <div class="your-name inside">
                YOUR NAME
            </div>
            <div class="input-div outer-input">
                <input placeholder="please type">
            </div>
            
            
        </div>
        <div class="father outer">
            <div class="father-name inside">
                FATHER NAME
            </div>
            <div class="input-div outer-input">
                <input placeholder="please type">
            </div>

        </div>
        <div class="mother outer">
            <div class="mother-name inside">
                MOTHER NAME
            </div>
            <div class="input-div outer-input">
                <input placeholder="please type">
            </div>

        </div>
        <div class="email outer">
            <div class="email-name inside">
                EMAIL
            </div>
            <div class="input-div outer-input">
                <input placeholder="please type">
            </div>

        </div>
        <div class="address outer">
            <div class="address-name inside">
                ADDRESS
            </div>
            <div class="input-div outer-input">
                <input placeholder="please type">
            </div>

        </div>
        <div class="mobile outer">
            <div class="mobile-name inside">
                MOBILE
            </div>
            <div class="input-div outer-input">
                <input placeholder="please type">
            </div>

        </div>
        <div class="purpose outer">
            <div class="purpose-name inside">
                PURPOSE
            </div>
            <div class="input-div outer-input">
                <input placeholder="please type">
            </div>

        </div>
        <div class="submit-div">
            <button>SUBMIT</button>
        </div>

    </div>
</body>
</html>
